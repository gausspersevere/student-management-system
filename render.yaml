

services:
  - type: web
    name: studentms-api
    runtime: dotnet
    plan: free            # Free tier is fine for school projects
    region: singapore     # Closest to Philippines
    
    # ---- BUILD ----
    # Render runs this command to compile your app
    # Equivalent to: you pressing "Run" in Visual Studio
    buildCommand: dotnet publish Backend/StudentMS.Api.csproj -c Release -o ./publish
    
    # ---- START ----
    # Render runs this to launch your compiled API
    # The PORT env variable is automatically set by Render
    startCommand: dotnet ./publish/StudentMS.Api.dll
    
    # ---- ENVIRONMENT VARIABLES ----
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      
    
      - key: ConnectionStrings__DefaultConnection
        sync: false   
