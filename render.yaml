# ============================================================
# render.yaml — Render Deployment Configuration
#
# This file tells Render how to build and run your ASP.NET API.
# Commit this file to the ROOT of your GitHub repository.
#
# Render reads this automatically when you connect your repo.
# ============================================================

services:
  - type: web
    name: studentms-api
    runtime: dotnet
    plan: free            # Free tier is fine for school projects
    region: singapore     # Closest to Philippines
    
    # ---- BUILD ----
    # Render runs this command to compile your app
    # Equivalent to: you pressing "Run" in Visual Studio
    buildCommand: dotnet publish Backend/StudentMS.Api.csproj -c Release -o ./publish
    
    # ---- START ----
    # Render runs this to launch your compiled API
    # The PORT env variable is automatically set by Render
    startCommand: dotnet ./publish/StudentMS.Api.dll
    
    # ---- ENVIRONMENT VARIABLES ----
    # These are set in Render's dashboard (not hardcoded here for security)
    # Go to: Render Dashboard → Your Service → Environment
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      
      # Set this in Render dashboard with your actual MySQL connection string
      # Format: Server=HOST;Port=3306;Database=DB_NAME;User=USER;Password=PASS;
      - key: ConnectionStrings__DefaultConnection
        sync: false   # means: enter this manually in Render dashboard
